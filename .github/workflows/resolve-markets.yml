name: Resolve Markets

on:
  schedule:
    # Every 5 minutes — minimum GitHub allows
    - cron: '*/5 * * * *'
  # Also allows manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger AI resolution
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "${{ secrets.APP_URL }}/api/agent/resolve" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          echo "Response: $response"
          if [ "$response" != "200" ]; then
            echo "::warning::Resolve endpoint returned $response"
          fi
