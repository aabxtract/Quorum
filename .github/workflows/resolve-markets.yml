name: Resolve Markets

on:
  schedule:
    # Every 5 minutes — minimum GitHub allows for scheduled workflows
    - cron: '*/5 * * * *'
  # Allows manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger AI resolution
        run: |
          APP_URL="${{ secrets.APP_URL || 'https://quorum-flashmarkets.vercel.app' }}"
          response=$(curl -s -o body.txt -w "%{http_code}" -X POST \
            "${APP_URL}/api/agent/resolve" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          echo "HTTP status: $response"
          echo "Body: $(cat body.txt)"
          if [ "$response" != "200" ]; then
            echo "::warning::Resolve endpoint returned $response"
          fi
